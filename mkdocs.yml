    - Linux Users and Privileges: content/linuxuserpriv.md
    - Mapping Hostnames to IPs: content/hostnamemapping.md
    - Networking: content/networking.md
    - Python Networking: content/pynet.md
    
    - H4X:
      - Bruteforce Attacks: content/bruteforce.md
      - Buffer Overflow x86: content/B0x86.md
      - Hacking Methodology: content/hmet.md
      - Information Gathering Tools: content/igtools.md
      - MSFconsole: content/msfc.md
      - Manual Exploitation Guide: content/manuexpl.md
      - Researching Vulnerabilities: content/revul.md
      - Scanning and Enumeration: content/scanenum.md
      - Shell Exploitation: content/shell.md
      - SMB (Server Message Block): content/smb.md
      - SSH (Secure Shell): content/ssh.md
      - Wordpress exploitation: content/wpexplo.md
      - Burpsuite - Stuffing & Spraying: content/burpspray.md
