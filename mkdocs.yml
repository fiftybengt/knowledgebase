site_name: My Knowledge Base
theme:
  name: material 
  palette:
    scheme: slate
  features:
    #- navigation.tabs
    - search.suggest
    - search.highlight
plugins:
  - search
  - roamlinks
extra_css:
  - css/stylesheet.css
markdown_extensions:
  - admonition
  - pymdownx.superfences
  - nl2br

nav:
  - Home: index.md
  - Git:
